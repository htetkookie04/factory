[build]
  # Run vite via npx (through Node) so a lost exec bit on node_modules/.bin/vite
  # can't cause "vite: Permission denied".
  command = "npm install && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every route serves index.html so React Router handles it
# (fixes blank page / 404 on refresh of /admin, /app, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
